name: Deploy Cloud Resume Challenge

on:
  push:
    branches:
      - main # Or 'master' if that's your main branch

env:
  GCP_PROJECT_ID: eng-diagram-435207-s6               # Your GCP Project ID
  GCP_REGION: us-central1                             # Your primary GCP region (e.g., us-central1)
  CLOUD_RUN_SERVICE_NAME: visitor-counter             # Your Cloud Run service name (e.g., visitor-counter)
  GCS_BUCKET_NAME: www.temitayoapata.online           # Your GCS bucket name for the frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Needed for authenticating with GCP

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Unit Test Steps ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Ensure this matches your Cloud Run Python version

      - name: Install Python dependencies for tests
        run: |
          python -m pip install --upgrade pip
          pip install -r counter_backend/requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          pytest counter_backend/

      # --- GCP Authentication ---
      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      # --- Build and Push Cloud Run Container Image ---
      - name: Build and Push Cloud Run Image
        id: build_image
        run: |
          gcloud builds submit --tag gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE_NAME }}:${{ github.sha }} counter_backend/
          echo "IMAGE_TAG=gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      # --- Terraform Setup and Apply ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.x

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false -var="gcp_project_id=${{ env.GCP_PROJECT_ID }}" -var="gcp_region=${{ env.GCP_REGION }}" -var="cloud_run_service_name=${{ env.CLOUD_RUN_SERVICE_NAME }}" -var="cloud_run_image_tag=${{ env.IMAGE_TAG }}" -var="gcs_bucket_name=${{ env.GCS_BUCKET_NAME }}" -var="gcs_bucket_location=US" -var="firestore_location=nam5"
        working-directory: ./terraform

      # --- Frontend Sync to GCS ---
      - name: Sync HTML Resume (Frontend) to GCS
        run: |
          gcloud storage rsync . gs://${{ env.GCS_BUCKET_NAME }} --recursive
