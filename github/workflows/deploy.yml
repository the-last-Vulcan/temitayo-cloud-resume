name: Deploy Cloud Resume Challenge

on:
  push:
    branches:
      - main # Or 'master' if that's your main branch

env:
  GCP_PROJECT_ID: eng-diagram-435207-s6            # <-- REPLACE THIS
  GCP_REGION: us-central1                   # <-- REPLACE THIS (e.g., us-central1)
  CLOUD_RUN_SERVICE_NAME: visitor-counter # <-- REPLACE THIS (e.g., visitor-counter)
  GCS_BUCKET_NAME: www.temitayoapata.online      # <-- REPLACE THIS

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Needed for authenticating with GCP

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Unit Test Steps ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # <-- REPLACE THIS with your Cloud Run Python version

      - name: Install Python dependencies for tests
        run: |
          python -m pip install --upgrade pip
          pip install -r counter_backend/requirements.txt # Install dependencies for your backend code
          pip install pytest # Install pytest for running tests

      - name: Run unit tests
        run: |
          pytest counter_backend/ # Run tests in your backend directory

      # --- GCP Deployment Steps (will only run if tests pass) ---
      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Uses the GitHub Secret

      - name: Set up Google Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy Cloud Run Service
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE_NAME }} \
            --source counter_backend/ \ # Path to your Cloud Run code within the repo
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \ # If your service is publicly callable
            --set-env-vars YOUR_ENV_VAR=value # Add any environment variables your service needs
        # Note: You might need to add --platform managed if it's your first time deploying via gcloud CLI
        # or --image if you are building and pushing a custom image first.
        # For simple source deployment, the above is usually enough.

      - name: Sync HTML Resume (Frontend) to GCS
        run: |
          gcloud storage rsync . gs://${{ env.GCS_BUCKET_NAME }} \
            --exclude-unmatched-urls \
            --recursive \
            --content-type 'text/html' .html \
            --content-type 'text/css' .css \
            --content-type 'application/javascript' .js \
            --content-type 'image/jpeg' .jpeg \
            --content-type 'image/png' .png \
            --content-type 'image/gif' .gif \
            --content-type 'image/svg+xml' .svg \
            --content-type 'application/font-woff' .woff \
            --content-type 'application/font-woff2' .woff2 \
            --content-type 'application/font-ttf' .ttf
        # Make sure the dot '.' after rsync refers to the root of your repo
        # because your frontend files (index.html, style.css, script.js) are there.